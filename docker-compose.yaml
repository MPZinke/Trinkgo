version: "3"
services:
  trinkgo:
    container_name: trinkgo
    image: registry.digitalocean.com/trinkgo-cr/trinkgo:1.0.0
    platform: linux/amd64
    build:
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - PROTOCOL=local
    ports:
      - 443:443
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "unless-stopped"
    tty: true
